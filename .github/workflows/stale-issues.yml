name: "Backlog Maintenance"

on:
  schedule:
    - cron: "0 0 * * *" # Runs daily at midnight
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v10
        with:
          # --- Thresholds ---
          days-before-stale: 30
          days-before-close: -1

          # --- Rate Limiting ---
          operations-per-run: 200

          # --- Old to New Sorting ---
          ascending: true

          # --- Exclusions ---
          # 1. Documentation: Never mark these as stale
          # 2. Stale/Closed: The bot naturally ignores things already closed
          exempt-issue-labels: "documentation,pinned,security,important,enhancement,Compliance,In-progress,Policy-Audit,Privacy-Policy"
          exempt-pr-labels: "documentation,dependencies"

          # --- Issue Messages ---
          stale-issue-message: |
            **Automatic Maintenance Check** 🤖

            This issue has had no activity for 30 days. To help us keep our backlog clean and relevant, please check if this issue is still valid:

            1. **If this issue is still valid and needs to be fixed:** Please leave a comment explaining the current state or confirming that it's still an issue. This will remove the `stale` tag.
            2. **If this issue is no longer valid or has already been fixed:** Please close this issue, or leave a comment so we can close it.

          # --- PR Messages ---
          stale-pr-message: |
            **PR Maintenance Check** 🛠️

            This Pull Request has been open for 30 days without updates. Please check if this PR is still valid:

            1. **If this PR is still valid and needs to be merged:** Please push a commit or comment to keep it active, which will remove the `stale` tag.
            2. **If this PR is no longer valid:** Please close it, or leave a comment so we can close it.
